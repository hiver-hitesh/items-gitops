apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}      # "postgres-dev" — the app connects here
  labels:
    app: postgres
spec:
  clusterIP: None                       # headless → stable DNS for the StatefulSet
  selector:
    app: postgres
  ports:
  - name: postgres
    port: {{ .Values.service.port }}
    targetPort: 5432
